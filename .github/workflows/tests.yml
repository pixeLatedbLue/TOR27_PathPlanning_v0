name: tests

on:
  push:
  pull_request:

jobs:
  test:
    # Ubuntu matches the deployment target (the Jetson runs Ubuntu 24.04).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest -v
      - name: Headless smoke test (every mission must finish)
        run: python run_headless.py all
